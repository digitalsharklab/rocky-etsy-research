<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="💎 R.O.C.K.Y.">
  <meta name="theme-color" content="#020810">
  <title>💎 R.O.C.K.Y. — AI Assistant</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><defs><linearGradient id='gT' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%23a0f0ff'/><stop offset='40%' stop-color='%2300c8ff'/><stop offset='100%' stop-color='%230033cc'/></linearGradient><linearGradient id='gL' x1='0%' y1='0%' x2='100%' y2='0%'><stop offset='0%' stop-color='%237b2fff' stop-opacity='0.9'/><stop offset='100%' stop-color='%230066ff' stop-opacity='0.7'/></linearGradient><linearGradient id='gR' x1='0%' y1='0%' x2='100%' y2='0%'><stop offset='0%' stop-color='%2300c8ff' stop-opacity='0.6'/><stop offset='100%' stop-color='%2300ffcc' stop-opacity='0.9'/></linearGradient><linearGradient id='gB' x1='0%' y1='0%' x2='0%' y2='100%'><stop offset='0%' stop-color='%230044aa'/><stop offset='100%' stop-color='%23050820'/></linearGradient><filter id='glow'><feGaussianBlur stdDeviation='4' result='blur'/><feMerge><feMergeNode in='blur'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs><rect width='512' height='512' fill='%23020810'/><circle cx='256' cy='256' r='180' fill='none' stroke='rgba(0,200,255,0.1)' stroke-width='1'/><g filter='url(%23glow)'><polygon points='256,80 340,180 256,220' fill='url(%23gT)' opacity='0.95'/><polygon points='256,80 172,180 256,220' fill='url(%23gT)' opacity='0.7'/><polygon points='172,180 256,220 256,360 120,260' fill='url(%23gL)' opacity='0.9'/><polygon points='340,180 256,220 256,360 392,260' fill='url(%23gR)' opacity='0.9'/><polygon points='120,260 256,360 392,260 256,220' fill='url(%23gB)' opacity='0.8'/><circle cx='210' cy='140' r='6' fill='white' opacity='0.8'/></g></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020810;
      --bg2: #050d1a;
      --panel: #071528;
      --border: #0d4a7a;
      --accent: #00c8ff;
      --accent2: #0066ff;
      --glow: rgba(0,200,255,0.15);
      --text: #c8e8ff;
      --text2: #6a9fc0;
      --red: #ff3b3b;
      --green: #00ff88;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
    }
    .container { display: flex; height: 100vh; }
    .sidebar {
      width: 240px;
      border-right: 1px solid var(--border);
      padding: 20px 0;
      overflow-y: auto;
    }
    .nav-btn {
      width: 100%;
      padding: 12px 20px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: 'Rajdhani', sans-serif;
      cursor: pointer;
      text-align: left;
      transition: all 0.3s;
      font-size: 13px;
      border-left: 3px solid transparent;
    }
    .nav-btn:hover, .nav-btn.active {
      color: var(--accent);
      background: var(--glow);
      border-left-color: var(--accent);
    }
    .main { flex: 1; display: flex; flex-direction: column; }
    .header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0,200,255,0.05) 0%, transparent 100%);
    }
    .header h1 { font-size: 24px; color: var(--accent); letter-spacing: 1px; }
    .content { flex: 1; overflow-y: auto; padding: 30px; }
    .tab { display: none; }
    .tab.active { display: block; }
    h2 { font-size: 18px; color: var(--accent); margin-bottom: 20px; letter-spacing: 1px; }
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 16px;
    }
    .messages {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-y: auto;
      background: rgba(0,200,255,0.02);
    }
    .message {
      margin-bottom: 12px;
      padding: 12px 16px;
      border-radius: 6px;
      border-left: 3px solid var(--accent);
      background: rgba(0,200,255,0.05);
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user {
      border-left-color: var(--accent2);
      background: rgba(0,102,255,0.08);
      text-align: right;
    }
    .message.error {
      border-left-color: var(--red);
      background: rgba(255,59,59,0.1);
      color: var(--red);
    }
    .input-row {
      display: flex;
      gap: 12px;
    }
    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(0,200,255,0.02);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
    }
    .input-row input::placeholder { color: var(--text2); }
    .input-row button {
      padding: 12px 32px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      transition: all 0.3s;
    }
    .input-row button:hover {
      background: var(--accent);
      color: var(--bg);
    }
    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text2);
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <button class="nav-btn active" onclick="switchTab('chat')">💬 CHAT</button>
    <button class="nav-btn" onclick="switchTab('research')">🔍 ETSY RESEARCH</button>
    <button class="nav-btn" onclick="switchTab('dashboard')">📊 DASHBOARD</button>
    <button class="nav-btn" onclick="switchTab('plan')">📅 PLAN</button>
  </div>
  <div class="main">
    <div class="header">
      <h1>💎 R.O.C.K.Y. — AI Assistant</h1>
      <div style="font-size: 11px; color: var(--text2); margin-top: 8px;">
        ✓ SYSTEM ONLINE | API: READY | VERCEL: CONNECTED
      </div>
    </div>
    <div class="content">
      <div id="chat" class="tab active">
        <h2>💬 CHAT WITH CLAUDE</h2>
        <div class="chat-container">
          <div class="messages" id="messages"></div>
          <div class="input-row">
            <input type="text" id="userInput" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">SEND</button>
          </div>
        </div>
      </div>
      <div id="research" class="tab">
        <h2>🔍 ETSY RESEARCH</h2>
        <p style="color: var(--text2);">Research coming soon...</p>
      </div>
      <div id="dashboard" class="tab">
        <h2>📊 DASHBOARD</h2>
        <p style="color: var(--text2);">Dashboard coming soon...</p>
      </div>
      <div id="plan" class="tab">
        <h2>📅 WEEKLY PLAN</h2>
        <p style="color: var(--text2);">Plan generator coming soon...</p>
      </div>
    </div>
  </div>
</div>

<script>
  const BACKEND_URL = 'https://rocky-api-ruc5.onrender.com';

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    event.target.classList.add('active');
  }

  function addMessage(text, isUser = false) {
    const messagesDiv = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = `message ${isUser ? 'user' : ''}`;
    msg.textContent = text;
    messagesDiv.appendChild(msg);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    addMessage(text, true);
    
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'message';
    loadingDiv.innerHTML = '<div class="loading"><div class="spinner"></div> Thinking...</div>';
    document.getElementById('messages').appendChild(loadingDiv);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

    try {
      const response = await fetch(`${BACKEND_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      const data = await response.json();
      loadingDiv.remove();

      if (data.success && data.response) {
        addMessage(data.response, false);
      } else {
        addMessage(`❌ Error: ${data.error || 'Unknown error'}`, false);
      }
    } catch (error) {
      loadingDiv.remove();
      addMessage(`❌ Error: ${error.message}`, false);
    }
  }

  window.addEventListener('load', () => {
    addMessage('👋 Hello! I\'m R.O.C.K.Y., your AI assistant for Etsy digital products. How can I help you today?', false);
  });
</script>
</body>
</html>
