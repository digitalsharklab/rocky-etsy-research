<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💎 R.O.C.K.Y.</title>
  <style>
    :root { --bg: #020810; --accent: #00c8ff; --text: #c8e8ff; --border: #0d4a7a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
    .container { display: flex; height: 100vh; }
    .sidebar { width: 240px; border-right: 1px solid var(--border); padding: 20px 0; }
    .nav-btn { width: 100%; padding: 12px 20px; border: none; background: transparent; color: var(--text); cursor: pointer; text-align: left; transition: all 0.3s; }
    .nav-btn.active { color: var(--accent); background: rgba(0,200,255,0.1); border-left: 3px solid var(--accent); }
    .main { flex: 1; display: flex; flex-direction: column; }
    .header { padding: 20px; border-bottom: 1px solid var(--border); }
    .header h1 { color: var(--accent); font-size: 24px; }
    .content { flex: 1; padding: 30px; overflow-y: auto; }
    .tab { display: none; }
    .tab.active { display: block; }
    .messages { border: 1px solid var(--border); border-radius: 8px; padding: 16px; height: 300px; overflow-y: auto; margin-bottom: 16px; background: rgba(0,200,255,0.02); }
    .message { margin-bottom: 12px; padding: 12px; border-radius: 6px; border-left: 3px solid var(--accent); background: rgba(0,200,255,0.05); }
    .message.user { border-left-color: #0066ff; text-align: right; }
    .input-row { display: flex; gap: 12px; }
    .input-row input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: rgba(0,200,255,0.02); color: var(--text); }
    .input-row button { padding: 12px 32px; border: 1px solid var(--accent); border-radius: 6px; background: transparent; color: var(--accent); cursor: pointer; font-weight: 600; transition: all 0.3s; }
    .input-row button:hover { background: var(--accent); color: var(--bg); }
  </style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <button class="nav-btn active" onclick="switchTab('chat')">💬 CHAT</button>
    <button class="nav-btn" onclick="switchTab('research')">🔍 RESEARCH</button>
    <button class="nav-btn" onclick="switchTab('dashboard')">📊 DASHBOARD</button>
  </div>
  <div class="main">
    <div class="header">
      <h1>💎 R.O.C.K.Y. — AI Assistant</h1>
      <div style="font-size: 11px; color: #6a9fc0;">✓ SYSTEM ONLINE | HAIKU MODE</div>
    </div>
    <div class="content">
      <div id="chat" class="tab active">
        <h2>💬 CHAT</h2>
        <div class="messages" id="messages"></div>
        <div class="input-row">
          <input type="text" id="userInput" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') sendMessage()">
          <button onclick="sendMessage()">SEND</button>
        </div>
      </div>
      <div id="research" class="tab">
        <h2>🔍 ETSY RESEARCH</h2>
        <p style="color: #6a9fc0;">Coming soon...</p>
      </div>
      <div id="dashboard" class="tab">
        <h2>📊 DASHBOARD</h2>
        <p style="color: #6a9fc0;">Coming soon...</p>
      </div>
    </div>
  </div>
</div>

<script>
  const BACKEND_URL = 'http://localhost:8000';

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    event.target.classList.add('active');
  }

  function addMessage(text, isUser = false) {
    const msg = document.createElement('div');
    msg.className = `message ${isUser ? 'user' : ''}`;
    msg.textContent = text;
    document.getElementById('messages').appendChild(msg);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMessage(text, true);

    try {
      const response = await fetch(`${BACKEND_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await response.json();
      if (data.success && data.response) {
        addMessage(data.response, false);
      } else {
        addMessage(`Error: ${data.error}`, false);
      }
    } catch (error) {
      addMessage(`Error: ${error.message}`, false);
    }
  }

  window.addEventListener('load', () => {
    addMessage('👋 Hello! I am R.O.C.K.Y., your AI assistant for Etsy digital products. How can I help?', false);
  });
</script>
</body>
</html>
